name: geny_app
description: GenY — Super-app for ride-hailing + food delivery. Passenger and driver app in one codebase (role-based).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.10

  # Routing
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.1

  # Secure storage (JWT)
  flutter_secure_storage: ^9.0.0

  # WebSocket (real-time tracking)
  web_socket_channel: ^2.4.0

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.3

  # Push notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.6
  flutter_local_notifications: ^16.0.0

  # UI helpers
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.5
  flutter_rating_bar: ^4.0.1
  timeago: ^3.6.0
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
